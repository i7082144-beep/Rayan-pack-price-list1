<footer class="foot">الأسعار غير ثابتة وقابلة للتغيير — للاستفسار والتواصل مع ريان باك مباشرة</footer>

<script src="data.js"></script>
<script src="render.js"></script>
  <script>
const BIN_ID = "ضع_BIN_ID_هنا";
const API_KEY = "ضع_X-Master-Key_هنا";

let products = []; // هتتخزن فيها المنتجات وقت التعديل

// تحميل المنتجات أول ما الداشبورد يفتح
async function loadProducts() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: { "X-Master-Key": API_KEY }
  });
  const data = await res.json();
  products = data.record;
  renderAdminTable(products); // استبدلها بفانكشن عرض الجدول عندك
}

// حفظ التعديلات ورفعها لـ JSONBin
async function saveProducts() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": API_KEY
      },
      body: JSON.stringify(products)
    });
    if (res.ok) {
      alert("✅ اتحفظ التعديل وهيظهر لكل الزوار");
    } else {
      alert("❌ حصل خطأ في الحفظ");
    }
  } catch (err) {
    console.error(err);
    alert("❌ فشل الاتصال بالسيرفر");
  }
}

// مثال: تعديل سعر منتج معيّن
function updatePrice(productId, newPrice) {
  const product = products.find(p => p.id === productId);
  if (product) {
    product.price = newPrice;
    saveProducts(); // يحفظ فورًا بعد كل تعديل
  }
}

function renderAdminTable(products) {
  const table = document.getElementById("admin-table"); // غيّر الـ id لو مختلف
  table.innerHTML = "";
  products.forEach(p => {
    table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td><input type="number" value="${p.price}" onchange="updatePrice('${p.id}', this.value)"></td>
        <td>${p.category}</td>
      </tr>
    `;
  });
}

loadProducts();
</script>
</body>
